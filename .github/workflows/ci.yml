name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (vet + lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: server

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go build
        run: go build ./...

  shell:
    name: shellcheck (client scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck client/*.sh
